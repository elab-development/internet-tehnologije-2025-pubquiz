name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run Vitest Tests
        run: npm test
        env:
          JWT_SECRET: "ci_test_secret_123"

  
  build-docker:
    needs: test #doker se gradi samo ako testovi prodju
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t pubquiz-app .
      - name: Docker Image Check
        run: docker images # samo provera da li je image kreiran

        